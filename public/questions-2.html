<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Grade 12 Learning - Mathematics Question Workspace</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="initializeMathematicalTypesetting()"></script>

    <style>
        /* ==========================================================================
           1. CORE DESIGN SYSTEM & VARIABLES (EXACT MATCH TO PHOTO PALETTE)
           ========================================================================== */
        :root {
            /* Primary Brand Color System */
            --brand-primary: #1d68f2;
            --brand-primary-rgb: 29, 104, 242;
            --brand-hover: #1153cb;
            --brand-active: #0a3da1;
            --brand-light: #eff6ff;
            --brand-border: #dbeafe;
            
            /* High-Contrast Typography Color Scales */
            --color-text-title: #07122c;
            --color-text-body: #4b5b75;
            --color-text-muted: #64748b;
            
            /* Component Boundaries & Structural Colors */
            --color-border-light: #f1f5f9;
            --color-border-card: #e2e8f0;
            --color-border-active: #cbd5e1;
            
            /* Global Canvas Background Tones */
            --bg-canvas: #f8fafc;
            --bg-card: #ffffff;
            
            /* Smooth Motion Easing Configurations */
            --easing-fluid: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-speed: 0.28s;
            --transition-smooth: all var(--transition-speed) var(--easing-fluid);
            
            /* Professional UI Shadows (Clean, Soft & Modern) */
            --shadow-subtle: 0 4px 20px rgba(29, 104, 242, 0.015);
            --shadow-hover: 0 12px 36px rgba(29, 104, 242, 0.05);
            --shadow-soft-card: 0 8px 30px rgba(0, 0, 0, 0.02);
            --shadow-modal: 0 24px 60px rgba(7, 18, 44, 0.16);
        }

        /* ==========================================================================
           2. RESET ENGINE & SYSTEM SHIELD AGAINST HORIZONTAL SIDE-SCROLLING
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-canvas);
            color: var(--color-text-title);
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            /* EXTREME GUARDRAIL: Restricts sideways overflow on any physical layout */
            overflow-x: hidden !important; 
            
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* ==========================================================================
           3. CONTAINER SYSTEM MATCHED TO COMPACT 840px LAYOUT
           ========================================================================== */
        .app-root-container {
            width: 100%;
            max-width: 840px; 
            padding: 0 24px 80px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-sizing: border-box;
        }

        /* ==========================================================================
           4. NAVIGATION HEADER SYSTEM
           ========================================================================== */
        .nav-outer-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            background: transparent;
            z-index: 100;
        }

        .navigation-header {
            width: 100%;
            max-width: 840px;
            padding: 32px 24px 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            box-sizing: border-box;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--brand-primary);
            text-decoration: none;
            font-size: 0.98rem;
            font-weight: 700;
            transition: var(--transition-smooth);
            background: none;
            border: none;
            cursor: pointer;
        }

        .back-button:hover {
            color: var(--brand-hover);
        }

        .back-button svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2.8;
            fill: none;
        }

        .user-dropdown-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            padding: 4px;
            border-radius: 50px;
            transition: var(--transition-smooth);
        }

        .user-dropdown-trigger:hover {
            opacity: 0.85;
        }

        .user-avatar-circle {
            width: 38px;
            height: 38px;
            background-color: var(--brand-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .user-avatar-circle svg {
            width: 20px;
            height: 20px;
            fill: var(--brand-primary);
        }

        .user-name-label {
            font-weight: 700;
            font-size: 0.98rem;
            color: var(--color-text-title);
            letter-spacing: -0.2px;
        }

        .dropdown-chevron {
            width: 12px;
            height: 12px;
            stroke: var(--color-text-title);
            stroke-width: 2.5;
            fill: none;
            margin-left: 2px;
        }

        /* ==========================================================================
           5. ACCORDION HEADER & YEAR DRAWER ("2025 LATEST")
           ========================================================================== */
        .accordion-wrapper-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid rgba(226, 232, 240, 0.85);
            box-shadow: var(--shadow-soft-card);
            overflow: hidden;
            width: 100%;
            transition: var(--transition-smooth);
        }

        .accordion-wrapper-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: rgba(29, 104, 242, 0.1);
        }

        .accordion-header-btn {
            width: 100%;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
        }

        .accordion-meta-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .accordion-calendar-icon-box {
            width: 44px;
            height: 44px;
            background-color: #f1f5f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .accordion-calendar-icon-box svg {
            width: 22px;
            height: 22px;
            stroke: var(--brand-primary);
            stroke-width: 2;
            fill: none;
        }

        .accordion-subject-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--color-text-title);
            letter-spacing: -0.4px;
        }

        .accordion-arrow-indicator {
            width: 20px;
            height: 20px;
            stroke: var(--brand-primary);
            stroke-width: 2.5;
            fill: none;
            transition: transform 0.28s var(--easing-fluid);
        }

        /* Expanded Accordion Classes */
        .accordion-wrapper-card.is-expanded .accordion-arrow-indicator {
            transform: rotate(180deg);
        }

        .accordion-transition-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.28s var(--easing-fluid);
        }

        .accordion-wrapper-card.is-expanded .accordion-transition-panel {
            max-height: 250px;
        }

        .accordion-inner-content {
            padding: 0 24px 24px 24px;
            border-top: 1px solid var(--color-border-light);
            padding-top: 20px;
            display: flex;
            gap: 12px;
        }

        .segmented-tab-btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: 1px solid var(--brand-border);
            background: #ffffff;
            color: var(--brand-primary);
        }

        .segmented-tab-btn.is-active {
            background: var(--brand-primary);
            border-color: var(--brand-primary);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(29, 104, 242, 0.15);
        }

        /* ==========================================================================
           6. SYLLABUS SECTION BREAKS
           ========================================================================== */
        .section-separator-bar {
            margin-top: 12px;
            margin-bottom: 4px;
        }

        .section-separator-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--color-text-title);
            letter-spacing: -0.5px;
        }

        /* ==========================================================================
           7. SYSTEM WORKSPACE GRID (100% EXPLICIT ROW ALIGNMENT)
           ========================================================================== */
        .questions-vertical-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .question-item-card {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid rgba(226, 232, 240, 0.85);
            box-shadow: var(--shadow-soft-card);
            padding: 24px 28px;
            transition: var(--transition-smooth);
            width: 100%;
        }

        .question-item-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: rgba(29, 104, 242, 0.1);
        }

        /* Desktop Single-Row Flex Layout */
        .question-flex-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            width: 100%;
        }

        /* Left Content Workspace Side (Index + Math Equation) */
        .question-content-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .question-index-number {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--brand-primary);
            white-space: nowrap;
        }

        .question-text-content {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--color-text-title);
            line-height: 1.55;
            display: inline-flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .math-typeset-wrapper {
            display: inline-block;
            margin-left: 8px;
            font-size: 1.15rem;
            vertical-align: middle;
        }

        /* Right Content Workspace Side (Points Pill + Call to Actions) */
        .question-elements-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .points-weight-pill {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--color-text-muted);
            background-color: #f1f5f9;
            padding: 6px 12px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .question-actions-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Action Buttons Core System */
        .action-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 22px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-decoration: none;
            white-space: nowrap;
        }

        .action-button-outline {
            background: #ffffff;
            border: 1px solid var(--brand-border);
            color: var(--brand-primary);
        }

        .action-button-outline:hover {
            background-color: var(--brand-light);
            border-color: var(--brand-primary);
        }

        .action-button-solid {
            background: var(--brand-primary);
            border: 1px solid var(--brand-primary);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(29, 104, 242, 0.1);
        }

        .action-button-solid:hover {
            background: var(--brand-hover);
            border-color: var(--brand-hover);
            box-shadow: 0 6px 16px rgba(17, 83, 203, 0.2);
        }

        .action-button-solid svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        /* ==========================================================================
           8. RESPONSIVE MODAL SYSTEM (STEP-BY-STEP WORKSPACE)
           ========================================================================== */
        .backdrop-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(7, 18, 44, 0.4);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .backdrop-overlay.is-active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-surface-card {
            background: #ffffff;
            width: 90%;
            max-width: 620px;
            border-radius: 28px;
            padding: 36px;
            box-shadow: var(--shadow-modal);
            transform: scale(0.92);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .backdrop-overlay.is-active .modal-surface-card {
            transform: scale(1);
        }

        .modal-dismiss-btn {
            position: absolute;
            top: 28px;
            right: 28px;
            background: #f1f5f9;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--color-text-body);
            transition: var(--transition-smooth);
        }

        .modal-dismiss-btn:hover {
            background-color: var(--brand-light);
            color: var(--brand-primary);
        }

        .modal-heading {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--color-text-title);
            margin-bottom: 18px;
            letter-spacing: -0.4px;
        }

        .modal-content-container {
            font-size: 1.02rem;
            color: var(--color-text-body);
            line-height: 1.65;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Seamless Embedded Video Frame for Interactive Walkthroughs */
        .embedded-video-player {
            background-color: #07122c;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin-top: 16px;
        }

        .video-control-play-btn {
            width: 72px;
            height: 72px;
            background: var(--brand-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 8px 24px rgba(29, 104, 242, 0.3);
        }

        .video-control-play-btn:hover {
            transform: scale(1.08);
            background-color: var(--brand-hover);
        }

        .video-control-play-btn svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
            margin-left: 4px;
        }

        /* ==========================================================================
           9. SYSTEM FOOTER
           ========================================================================== */
        .page-footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            font-weight: 600;
            padding: 48px 0 16px 0;
            width: 100%;
            border-top: 1px solid var(--color-border-light);
            margin-top: 24px;
        }

        /* ==========================================================================
           10. FLUID MEDIA QUERIES (0% SIDE-SCROLLING GUARANTEE ON ALL MOBILE/TABLET CONFIGS)
           ========================================================================== */
        @media (max-width: 820px) {
            /* Handles landscape phones, smaller folds, and portrait iPads:
               Wraps the points pill and action toolbar smoothly to prevent visual crowding.
            */
            .question-flex-body {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .question-elements-right {
                width: 100%;
                justify-content: space-between;
                border-top: 1px solid var(--color-border-light);
                padding-top: 16px;
                margin-top: 4px;
            }
        }

        @media (max-width: 600px) {
            /* Full, unbreakable design defense system for mobile screen profiles:
               Stacks UI elements vertically to eliminate layout overflow.
            */
            .navigation-header {
                padding: 24px 20px 16px 20px;
            }
            
            .app-root-container {
                padding: 0 16px 60px 16px;
                gap: 20px;
            }

            .question-item-card {
                padding: 20px;
                border-radius: 20px;
            }
            
            .question-content-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .math-typeset-wrapper {
                display: block;
                margin-left: 0;
                margin-top: 10px;
                font-size: 1.1rem;
            }
            
            .question-elements-right {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }

            .points-weight-pill {
                align-self: flex-start;
            }

            .question-actions-toolbar {
                flex-direction: column; 
                width: 100%;
                gap: 10px;
            }
            
            .action-button {
                width: 100%; 
                text-align: center;
            }
            
            .user-name-label, .dropdown-chevron {
                display: none; 
            }
            
            .accordion-inner-content {
                flex-direction: column;
                gap: 10px;
            }
            
            .segmented-tab-btn {
                width: 100%;
                text-align: center;
            }

            .modal-surface-card {
                padding: 24px;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>

    <nav class="nav-outer-wrapper">
        <header class="navigation-header">
            <button class="back-button" onclick="history.back();">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to Papers
            </button>
            
            <div class="user-dropdown-trigger">
                <div class="user-avatar-circle">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <span class="user-name-label">Hi, Paul</span>
                <svg class="dropdown-chevron" viewBox="0 0 24 24">
                    <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </header>
    </nav>

    <div class="app-root-container">
        
        <div class="accordion-wrapper-card is-expanded" id="examAccordion">
            <button class="accordion-header-btn" onclick="toggleExamAccordion()" aria-expanded="true" aria-controls="examAccordionPanel">
                <div class="accordion-meta-group">
                    <div class="accordion-calendar-icon-box">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <span class="accordion-subject-title">2025 Latest</span>
                </div>
                <svg class="accordion-arrow-indicator" viewBox="0 0 24 24">
                    <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
            <div class="accordion-transition-panel" id="examAccordionPanel" style="max-height: 250px;">
                <div class="accordion-inner-content">
                    <button class="segmented-tab-btn is-active" id="paper1Btn" onclick="switchPaperChannel(1)">Mathematics Paper 1</button>
                    <button class="segmented-tab-btn" id="paper2Btn" onclick="switchPaperChannel(2)">Mathematics Paper 2</button>
                </div>
            </div>
        </div>

        <div class="section-separator-bar">
            <h2 class="section-separator-title" id="sectionHeaderA">Section A: Algebra</h2>
        </div>

        <main class="questions-vertical-stack" id="questionsContainerSectionA">
            </main>

        <div class="section-separator-bar" style="margin-top: 32px;">
            <h2 class="section-separator-title" id="sectionHeaderB">Section B: Functions & Graphs</h2>
        </div>

        <main class="questions-vertical-stack" id="questionsContainerSectionB">
            </main>

        <footer class="page-footer">
            &copy; 2026 Grade 12 Learning. All rights reserved.
        </footer>

    </div>

    <div class="backdrop-overlay" id="workspaceModalBackdrop">
        <div class="modal-surface-card">
            <button class="modal-dismiss-btn" onclick="dismissWorkspaceModal()" aria-label="Close solutions window">✕</button>
            <h3 class="modal-heading" id="modalWindowHeader">View Answer</h3>
            <div class="modal-content-container" id="modalWindowBody"></div>
        </div>
    </div>

    <script>
        /* ==========================================================================
           11. HIGH-FIDELITY SOLUTION MANIFEST DATA (PAPER 1 & PAPER 2 COMPLETE)
           ========================================================================== */
        const paperContentDatabase = {
            1: {
                sectionA: {
                    title: "Section A: Algebra",
                    questions: [
                        {
                            id: "1.1",
                            text: "Simplify the expression completely:",
                            math: "\\frac{2x^2 - 8x}{2x}",
                            points: "(2)",
                            solution: {
                                heading: "Solution Steps: Question 1.1 (Paper 1)",
                                bodyHtml: `
                                    <p style="margin-bottom: 14px; font-weight: 500;">Factor out the common factor $2x$ from the terms inside the numerator:</p>
                                    <div style="background: #f8fafc; border: 1px solid var(--color-border-light); padding: 18px; border-radius: 16px; margin-bottom: 18px;">
                                        $$\\frac{2x(x - 4)}{2x}$$
                                    </div>
                                    <p style="margin-bottom: 14px; font-weight: 500;">Cancel out the common $2x$ term from the numerator and denominator:</p>
                                    <div style="background: var(--brand-light); border-left: 5px solid var(--brand-primary); padding: 16px; border-radius: 8px 16px 16px 8px; font-weight: 700;">
                                        Final Solution: $x - 4 \\quad \\text{where } x \\neq 0$
                                    </div>
                                `
                            }
                        },
                        {
                            id: "1.2",
                            text: "Solve for $x$:",
                            math: "x^2 - 5x + 6 = 0",
                            points: "(3)",
                            solution: {
                                heading: "Solution Steps: Question 1.2 (Paper 1)",
                                bodyHtml: `
                                    <p style="margin-bottom: 14px; font-weight: 500;">Factor the trinomial by finding two values that multiply to $+6$ and add up to $-5$:</p>
                                    <div style="background: #f8fafc; border: 1px solid var(--color-border-light); padding: 18px; border-radius: 16px; margin-bottom: 18px;">
                                        $$(x - 2)(x - 3) = 0$$
                                    </div>
                                    <p style="margin-bottom: 14px; font-weight: 500;">Set each factor to $0$ to find the roots:</p>
                                    <p style="margin-bottom: 8px; padding-left: 12px; border-left: 3px solid var(--color-border-active); font-weight: 600;">$x - 2 = 0 \\implies x = 2$</p>
                                    <p style="margin-bottom: 18px; padding-left: 12px; border-left: 3px solid var(--color-border-active); font-weight: 600;">$x - 3 = 0 \\implies x = 3$</p>
                                    <div style="background: var(--brand-light); border-left: 5px solid var(--brand-primary); padding: 16px; border-radius: 8px 16px 16px 8px; font-weight: 700;">
                                        Final Roots: $x = 2 \\quad \\text{or} \\quad x = 3$
                                    </div>
                                `
                            }
                        },
                        {
                            id: "1.3",
                            text: "Solve for $x$ and $y$ simultaneously:",
                            math: "y = x - 3 \\quad \\text{and} \\quad x^2 + y^2 = 9",
                            points: "(6)",
                            solution: {
                                heading: "Solution Steps: Question 1.3 (Paper 1)",
                                bodyHtml: `
                                    <p style="margin-bottom: 14px; font-weight: 500;">Substitute the linear expression $y = x - 3$ directly into the quadratic circle equation:</p>
                                    <div style="background: #f8fafc; border: 1px solid var(--color-border-light); padding: 18px; border-radius: 16px; margin-bottom: 18px;">
                                        $$x^2 + (x - 3)^2 = 9$$
                                        $$x^2 + x^2 - 6x + 9 = 9$$
                                        $$2x^2 - 6x = 0$$
                                        $$2x(x - 3) = 0$$
                                    </div>
                                    <p style="margin-bottom: 14px; font-weight: 500;">Solve for the variable values of $x$, then plug back to get matching values for $y$:</p>
                                    <p style="margin-bottom: 8px; font-weight: 600;">For $x = 0 \\implies y = 0 - 3 = -3$</p>
                                    <p style="margin-bottom: 18px; font-weight: 600;">For $x = 3 \\implies y = 3 - 3 = 0$</p>
                                    <div style="background: var(--brand-light); border-left: 5px solid var(--brand-primary); padding: 16px; border-radius: 8px 16px 16px 8px; font-weight: 700;">
                                        Intersection Coordinates: (0; -3) \\quad \\text{and} \\quad (3; 0)
                                    </div>
                                `
                            }
                        }
                    ]
                },
                sectionB: {
                    title: "Section B: Functions & Graphs",
                    questions: [
                        {
                            id: "2.1",
                            text: "Given the hyperbola function $f(x) = \\frac{4}{x-2} + 1$, state equations of the asymptotes:",
                            math: "f(x) = \\frac{4}{x-2} + 1",
                            points: "(2)",
                            solution: {
                                heading: "Solution Steps: Question 2.1 (Paper 1)",
                                bodyHtml: `
                                    <p style="margin-bottom: 14px; font-weight: 500;">The vertical asymptote occurs where the denominator is undefined ($x - 2 = 0$):</p>
                                    <p style="margin-bottom: 14px; padding-left: 12px; border-left: 3px solid var(--brand-primary); font-weight: 600;">Vertical Asymptote: $x = 2$</p>
                                    <p style="margin-bottom: 14px; font-weight: 500;">The horizontal asymptote represents the limit value as $x \\to \\pm\\infty$:</p>
                                    <p style="margin-bottom: 18px; padding-left: 12px; border-left: 3px solid var(--brand-primary); font-weight: 600;">Horizontal Asymptote: $y = 1$</p>
                                    <div style="background: var(--brand-light); border-left: 5px solid var(--brand-primary); padding: 16px; border-radius: 8px 16px 16px 8px; font-weight: 700;">
                                        Asymptotes: $x = 2 \\quad \\text{and} \\quad y = 1$
                                    </div>
                                `
                            }
                        },
                        {
                            id: "2.2",
                            text: "Determine the $y$-intercept of the exponential function $g$:",
                            math: "g(x) = 3^{x+1} - 2",
                            points: "(2)",
                            solution: {
                                heading: "Solution Steps: Question 2.2 (Paper 1)",
                                bodyHtml: `
                                    <p style="margin-bottom: 14px; font-weight: 500;">Set the variable parameter $x = 0$ to determine where the curve intersects the vertical axis:</p>
                                    <div style="background: #f8fafc; border: 1px solid var(--color-border-light); padding: 18px; border-radius: 16px; margin-bottom: 18px;">
                                        $$g(0) = 3^{0+1} - 2$$
                                        $$g(0) = 3^1 - 2$$
                                        $$g(0) = 1$$
                                    </div>
                                    <div style="background: var(--brand-light); border-left: 5px solid var(--brand-primary); padding: 16px; border-radius: 8px 16px 16px 8px; font-weight: 700;">
                                        $y$-intercept Coordinate: (0; 1)
                                    </div>
                                `
                            }
                        }
                    ]
                }
            },
            2: {
                sectionA: {
                    title: "Section A: Trigonometry & Geometry",
                    questions: [
                        {
                            id: "1.1",
                            text: "Solve for $\\theta$ in the trigonometric interval $[0^\\circ; 180^\\circ]$:",
                            math: "2\\sin(\\theta) - 1 = 0",
                            points: "(3)",
                            solution: {
                                heading: "Solution Steps: Question 1.1 (Paper 2)",
                                bodyHtml: `
                                    <p style="margin-bottom: 14px; font-weight: 500;">Isolate the trigonometric factor to find the reference angle value:</p>
                                    <div style="background: #f8fafc; border: 1px solid var(--color-border-light); padding: 18px; border-radius: 16px; margin-bottom: 18px;">
                                        $$2\\sin(\\theta) = 1 \\implies \\sin(\\theta) = \\frac{1}{2}$$
                                    </div>
                                    <p style="margin-bottom: 14px; font-weight: 500;">Calculate the boundary answers in both Quadrant 1 and Quadrant 2:</p>
                                    <p style="margin-bottom: 8px; padding-left: 12px; border-left: 3px solid var(--color-border-active); font-weight: 600;">$\\theta = 30^\\circ$ (Quadrant 1 Reference Angle)</p>
                                    <p style="margin-bottom: 18px; padding-left: 12px; border-left: 3px solid var(--color-border-active); font-weight: 600;">$\\theta = 180^\\circ - 30^\\circ = 150^\\circ$ (Quadrant 2)</p>
                                    <div style="background: var(--brand-light); border-left: 5px solid var(--brand-primary); padding: 16px; border-radius: 8px 16px 16px 8px; font-weight: 700;">
                                        Final Solutions: $\\theta = 30^\\circ \\quad \\text{or} \\quad \\theta = 150^\\circ$
                                    </div>
                                `
                            }
                        },
                        {
                            id: "1.2",
                            text: "Simplify the trigonometric ratio using identity laws:",
                            math: "\\cos^2(\\beta) + \\sin^2(\\beta)",
                            points: "(2)",
                            solution: {
                                heading: "Solution Steps: Question 1.2 (Paper 2)",
                                bodyHtml: `
                                    <p style="margin-bottom: 14px; font-weight: 500;">Using the fundamental Pythagorean trigonometric identity theorem:</p>
                                    <div style="background: #f8fafc; border: 1px solid var(--color-border-light); padding: 18px; border-radius: 16px; margin-bottom: 18px;">
                                        $$\\cos^2(\\beta) + \\sin^2(\\beta) = 1$$
                                    </div>
                                    <div style="background: var(--brand-light); border-left: 5px solid var(--brand-primary); padding: 16px; border-radius: 8px 16px 16px 8px; font-weight: 700;">
                                        Final Value: 1
                                    </div>
                                `
                            }
                        }
                    ]
                },
                sectionB: {
                    title: "Section B: Analytical Geometry",
                    questions: [
                        {
                            id: "2.1",
                            text: "Determine the gradient parameter $m$ connecting coordinates $A(1; 2)$ and $B(3; 6)$:",
                            math: "A(1; 2) \\quad \\text{and} \\quad B(3; 6)",
                            points: "(2)",
                            solution: {
                                heading: "Solution Steps: Question 2.1 (Paper 2)",
                                bodyHtml: `
                                    <p style="margin-bottom: 14px; font-weight: 500;">Apply the coordinate gradient formula for a linear slope function:</p>
                                    <div style="background: #f8fafc; border: 1px solid var(--color-border-light); padding: 18px; border-radius: 16px; margin-bottom: 18px;">
                                        $$m = \\frac{y_2 - y_1}{x_2 - x_1}$$
                                        $$m = \\frac{6 - 2}{3 - 1}$$
                                        $$m = \\frac{4}{2} = 2$$
                                    </div>
                                    <div style="background: var(--brand-light); border-left: 5px solid var(--brand-primary); padding: 16px; border-radius: 8px 16px 16px 8px; font-weight: 700;">
                                        Final Gradient: $m = 2$
                                    </div>
                                `
                            }
                        },
                        {
                            id: "2.2",
                            text: "Find the distance between the points $A(1; 2)$ and $B(3; 6)$:",
                            math: "d = \\sqrt{(x_2-x_1)^2 + (y_2-y_1)^2}",
                            points: "(3)",
                            solution: {
                                heading: "Solution Steps: Question 2.2 (Paper 2)",
                                bodyHtml: `
                                    <p style="margin-bottom: 14px; font-weight: 500;">Substitute the respective coordinate pairs into the distance formula:</p>
                                    <div style="background: #f8fafc; border: 1px solid var(--color-border-light); padding: 18px; border-radius: 16px; margin-bottom: 18px;">
                                        $$d = \\sqrt{(3 - 1)^2 + (6 - 2)^2}$$
                                        $$d = \\sqrt{(2)^2 + (4)^2}$$
                                        $$d = \\sqrt{4 + 16} = \\sqrt{20}$$
                                    </div>
                                    <div style="background: var(--brand-light); border-left: 5px solid var(--brand-primary); padding: 16px; border-radius: 8px 16px 16px 8px; font-weight: 700;">
                                        Final Distance: $2\\sqrt{5} \\approx 4.47 \\text{ units}$
                                    </div>
                                `
                            }
                        }
                    ]
                }
            }
        };

        // Active State Tracker
        let currentActivePaper = 1;

        // DOM Hooks
        const backdropElement = document.getElementById('workspaceModalBackdrop');
        const modalHeaderElement = document.getElementById('modalWindowHeader');
        const modalBodyElement = document.getElementById('modalWindowBody');
        const paper1Button = document.getElementById('paper1Btn');
        const paper2Button = document.getElementById('paper2Btn');
        const sectionHeaderA = document.getElementById('sectionHeaderA');
        const sectionHeaderB = document.getElementById('sectionHeaderB');
        const questionsContainerSectionA = document.getElementById('questionsContainerSectionA');
        const questionsContainerSectionB = document.getElementById('questionsContainerSectionB');

        // Collapsible Accordion Manager for the Papers header
        function toggleExamAccordion() {
            const accordionCard = document.getElementById('examAccordion');
            const transitionPanel = document.getElementById('examAccordionPanel');
            const toggleButton = accordionCard.querySelector('.accordion-header-btn');
            
            if (accordionCard.classList.contains('is-expanded')) {
                accordionCard.classList.remove('is-expanded');
                transitionPanel.style.maxHeight = '0';
                toggleButton.setAttribute('aria-expanded', 'false');
            } else {
                accordionCard.classList.add('is-expanded');
                transitionPanel.style.maxHeight = '250px';
                toggleButton.setAttribute('aria-expanded', 'true');
            }
        }

        // Render Dynamic Database Questions on runtime or paper switch
        function populateWorkspaceQuestions() {
            const activeData = paperContentDatabase[currentActivePaper];
            
            // Set Section Headers
            sectionHeaderA.textContent = activeData.sectionA.title;
            sectionHeaderB.textContent = activeData.sectionB.title;

            // Clear Out Content Feeds
            questionsContainerSectionA.innerHTML = '';
            questionsContainerSectionB.innerHTML = '';

            // Generate Section A Cards
            activeData.sectionA.questions.forEach((q) => {
                const card = createQuestionCardHtml(q);
                questionsContainerSectionA.appendChild(card);
            });

            // Generate Section B Cards
            activeData.sectionB.questions.forEach((q) => {
                const card = createQuestionCardHtml(q);
                questionsContainerSectionB.appendChild(card);
            });

            // Re-run Typeset Engine
            initializeMathematicalTypesetting();
        }

        // Helper Card Builder Function
        function createQuestionCardHtml(question) {
            const article = document.createElement('article');
            article.className = 'question-item-card';
            article.innerHTML = `
                <div class="question-flex-body">
                    <div class="question-content-left">
                        <span class="question-index-number">${question.id}</span>
                        <div class="question-text-content">
                            ${question.text}
                            <span class="math-typeset-wrapper">$$${question.math}$$</span>
                        </div>
                    </div>
                    <div class="question-elements-right">
                        <span class="points-weight-pill">${question.points}</span>
                        <div class="question-actions-toolbar">
                            <button class="action-button action-button-outline" onclick="triggerAnswerOverlay('${question.id}')">View Answer</button>
                            <button class="action-button action-button-solid" onclick="triggerVideoOverlay('${question.id}')">
                                <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                Explain Answer
                            </button>
                        </div>
                    </div>
                </div>
            `;
            return article;
        }

        // Segment selector active tab visual toggler
        function switchPaperChannel(paperNumber) {
            currentActivePaper = paperNumber;
            if (paperNumber === 1) {
                paper1Button.classList.add('is-active');
                paper2Button.classList.remove('is-active');
            } else {
                paper1Button.classList.remove('is-active');
                paper2Button.classList.add('is-active');
            }
            populateWorkspaceQuestions();
        }

        // Render mathematical formulas using KaTeX CDN library
        function initializeMathematicalTypesetting() {
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        // Solutions rendering engine
        function triggerAnswerOverlay(questionIdentifier) {
            const activeData = paperContentDatabase[currentActivePaper];
            let questionObj = activeData.sectionA.questions.find(q => q.id === questionIdentifier);
            if (!questionObj) {
                questionObj = activeData.sectionB.questions.find(q => q.id === questionIdentifier);
            }

            if (questionObj && questionObj.solution) {
                modalHeaderElement.textContent = questionObj.solution.heading;
                modalBodyElement.innerHTML = questionObj.solution.bodyHtml;
                backdropElement.classList.add('is-active');
                initializeMathematicalTypesetting();
            }
        }

        // Walkthrough video simulator manager
        function triggerVideoOverlay(questionIdentifier) {
            modalHeaderElement.textContent = "Video Walkthrough: Question " + questionIdentifier;
            modalBodyElement.innerHTML = `
                <p style="margin-bottom: 16px; font-weight: 500;">Learn how to solve this algebraic expression step-by-step with an expert tutor guide.</p>
                <div class="embedded-video-player">
                    <button class="video-control-play-btn" aria-label="Play video explanation">
                        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </button>
                </div>
            `;
            backdropElement.classList.add('is-active');
        }

        // Close Active Overlay Modal
        function dismissWorkspaceModal() {
            backdropElement.classList.remove('is-active');
        }

        // Close overlay if background backdrop is clicked
        backdropElement.addEventListener('click', (event) => {
            if (event.target === backdropElement) {
                dismissWorkspaceModal();
            }
        });

        // Initialize App on Page Load
        window.addEventListener('DOMContentLoaded', () => {
            populateWorkspaceQuestions();
        });
    </script>
</body>
</html>
