<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Grade 12 Learning - Mathematics Paper 1 Workspace</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="initializeMathEngines()"></script>

    <style>
        /* ==========================================================================
           1. CORE DESIGN TOKENS & CSS BRAND VARIABLES
           ========================================================================== */
        :root {
            --brand-primary: #1d68f2;
            --brand-primary-rgb: 29, 104, 242;
            --brand-hover: #1153cb;
            --brand-active: #0a3da1;
            --brand-light: #eff6ff;
            --brand-border: #dbeafe;
            
            --success-green: #059669;
            --success-bg: #ecfdf5;
            
            --color-text-title: #07122c;
            --color-text-body: #4b5b75;
            --color-text-muted: #64748b;
            
            --color-border-light: #f1f5f9;
            --color-border-card: #e2e8f0;
            --color-border-active: #cbd5e1;
            
            --bg-canvas: #f8fafc;
            --bg-card: #ffffff;
            
            --easing-fluid: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-speed: 0.28s;
            --transition-smooth: all var(--transition-speed) var(--easing-fluid);
            
            --shadow-subtle: 0 4px 20px rgba(29, 104, 242, 0.015);
            --shadow-hover: 0 12px 36px rgba(29, 104, 242, 0.05);
            --shadow-soft-card: 0 8px 30px rgba(0, 0, 0, 0.02);
            
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --border-radius-sm: 12px;
        }

        /* ==========================================================================
           2. DEFENSIVE RESET ENGINE & LIQUID CANVAS (ZERO SIDE-SCROLL SHIELD)
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-canvas);
            color: var(--color-text-title);
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden !important; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* Base Application Layout Wrapper */
        .app-root-container {
            width: 100%;
            max-width: 840px; 
            padding: 0 24px 80px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        /* Screen-to-Screen Dynamic View Controller */
        .app-view {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 24px;
            animation: viewFadeIn 0.35s var(--easing-fluid) forwards;
        }

        .app-view.is-active {
            display: flex;
        }

        @keyframes viewFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==========================================================================
           3. BRAND NAVIGATION COMPONENT
           ========================================================================== */
        .nav-outer-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            background: transparent;
            z-index: 100;
        }

        .navigation-header {
            width: 100%;
            max-width: 840px;
            padding: 32px 24px 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            box-sizing: border-box;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--brand-primary);
            transition: var(--transition-smooth);
        }

        .brand-logo:hover {
            transform: translateY(-1px);
        }

        .brand-logo svg {
            width: 38px;
            height: 38px;
            fill: var(--brand-primary);
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 1.45rem;
            font-weight: 800;
            color: var(--color-text-title);
            letter-spacing: -0.4px;
        }

        .brand-title span {
            color: var(--brand-primary);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--brand-primary);
            text-decoration: none;
            font-size: 0.98rem;
            font-weight: 700;
            transition: var(--transition-smooth);
            background: none;
            border: none;
            cursor: pointer;
        }

        .back-button:hover {
            color: var(--brand-hover);
        }

        .back-button svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2.8;
            fill: none;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            background-color: transparent;
            padding: 6px 12px;
            border-radius: var(--border-radius-sm);
            transition: background-color var(--transition-smooth);
        }

        .user-profile:hover {
            background-color: rgba(29, 104, 242, 0.04);
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--brand-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar svg {
            width: 20px;
            height: 20px;
            fill: var(--brand-primary);
        }

        .user-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--color-text-title);
        }

        .chevron-down {
            width: 14px;
            height: 14px;
            stroke: var(--color-text-title);
            stroke-width: 2.5;
            fill: none;
            flex-shrink: 0;
            transition: transform var(--transition-smooth);
        }

        /* ==========================================================================
           4. PERSISTENT PAPER BANNER HERO (VIEW 2 SPECIFIC)
           ========================================================================== */
        .paper-banner {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 16px;
        }

        .banner-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .math-icon-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: var(--brand-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(29, 104, 242, 0.08);
        }

        .math-icon-wrapper svg {
            width: 28px;
            height: 28px;
            stroke: var(--brand-primary);
            stroke-width: 2;
            fill: none;
        }

        .banner-title-group h1 {
            font-size: 1.55rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            color: var(--color-text-title);
        }

        .banner-title-group p {
            color: var(--color-text-body);
            font-size: 0.92rem;
            font-weight: 500;
            line-height: 1.4;
        }

        /* ==========================================================================
           5. ACCORDION CONTROLS SYSTEM
           ========================================================================== */
        .accordion-wrapper-card {
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid rgba(226, 232, 240, 0.85);
            box-shadow: var(--shadow-soft-card);
            overflow: hidden;
            width: 100%;
            transition: var(--transition-smooth);
        }

        .accordion-wrapper-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: rgba(29, 104, 242, 0.1);
        }

        .accordion-header-btn {
            width: 100%;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            border: none;
            cursor: pointer;
            text-align: left;
        }

        .accordion-meta-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .accordion-calendar-icon-box {
            width: 44px;
            height: 44px;
            background-color: #f1f5f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .accordion-calendar-icon-box svg {
            width: 22px;
            height: 22px;
            stroke: var(--brand-primary);
            stroke-width: 2;
            fill: none;
        }

        .accordion-subject-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--color-text-title);
            letter-spacing: -0.4px;
        }

        .accordion-arrow-indicator {
            width: 20px;
            height: 20px;
            stroke: var(--brand-primary);
            stroke-width: 2.5;
            fill: none;
            transition: transform 0.28s var(--easing-fluid);
        }

        .accordion-wrapper-card.is-expanded .accordion-arrow-indicator {
            transform: rotate(180deg);
        }

        .accordion-transition-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.28s var(--easing-fluid);
        }

        .accordion-wrapper-card.is-expanded .accordion-transition-panel {
            max-height: 250px;
        }

        .accordion-inner-content {
            padding: 0 24px 24px 24px;
            border-top: 1px solid var(--color-border-light);
            padding-top: 20px;
            display: flex;
            gap: 12px;
        }

        .segmented-tab-btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            border: 1px solid var(--brand-border);
            background: #ffffff;
            color: var(--brand-primary);
        }

        .segmented-tab-btn.is-active {
            background: var(--brand-primary);
            border-color: var(--brand-primary);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(29, 104, 242, 0.15);
        }

        /* ==========================================================================
           6. SECTION BREAK BAR
           ========================================================================== */
        .section-separator-bar {
            margin-top: 12px;
            margin-bottom: 4px;
        }

        .section-separator-title {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--color-text-title);
            letter-spacing: -0.5px;
        }

        /* ==========================================================================
           7. INTERACTIVE QUESTIONS GALLERY (VIEW 1)
           ========================================================================== */
        .questions-vertical-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .question-item-card {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid rgba(226, 232, 240, 0.85);
            box-shadow: var(--shadow-soft-card);
            padding: 24px 28px;
            transition: var(--transition-smooth);
            width: 100%;
        }

        .question-item-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: rgba(29, 104, 242, 0.1);
        }

        .question-flex-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            width: 100%;
        }

        .question-content-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .question-index-number {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--brand-primary);
            white-space: nowrap;
        }

        .question-text-content {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--color-text-title);
            line-height: 1.55;
            display: inline-flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .math-typeset-wrapper {
            display: inline-block;
            margin-left: 8px;
            font-size: 1.15rem;
            vertical-align: middle;
        }

        .question-elements-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .points-weight-pill {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--color-text-muted);
            background-color: #f1f5f9;
            padding: 6px 12px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .question-actions-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 22px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-decoration: none;
            white-space: nowrap;
        }

        .action-button-outline {
            background: #ffffff;
            border: 1px solid var(--brand-border);
            color: var(--brand-primary);
        }

        .action-button-outline:hover {
            background-color: var(--brand-light);
            border-color: var(--brand-primary);
        }

        /* ==========================================================================
           8. STEP-BY-STEP SOLUTION ROADMAP DISPLAY (VIEW 2)
           ========================================================================== */
        .workspace-card {
            background-color: var(--bg-card);
            border: 1px solid var(--color-border-card);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-subtle);
            padding: 32px;
            width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .workspace-sub-header {
            background-color: var(--bg-card);
            border: 1px solid rgba(226, 232, 240, 0.85);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-soft-card);
            padding: 24px 28px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .workspace-sub-label {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--brand-primary);
            flex-shrink: 0;
        }

        .workspace-sub-equation {
            font-size: 1.1rem;
            font-weight: 600;
            flex: 1;
            margin-left: 8px;
            color: var(--color-text-title);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .workspace-sub-equation::-webkit-scrollbar {
            display: none;
        }

        .workspace-sub-marks {
            color: var(--color-text-title);
            font-weight: 700;
            font-size: 0.95rem;
            flex-shrink: 0;
            text-align: right;
        }

        .answer-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        .section-header {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--color-text-title);
            letter-spacing: -0.4px;
        }

        .toggle-answer-btn {
            background: transparent;
            border: none;
            color: var(--brand-primary);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color var(--transition-smooth);
        }

        .toggle-answer-btn:hover {
            color: var(--brand-hover);
        }

        .final-answer-box {
            border: 1.5px solid var(--color-border-light);
            border-radius: var(--border-radius-md);
            padding: 16px 20px;
            display: inline-flex; 
            align-items: center;
            gap: 16px;
            max-width: 100%;
            transition: var(--transition-smooth);
        }

        .final-answer-pill {
            background-color: var(--success-bg);
            color: var(--success-green);
            font-size: 0.85rem;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            flex-shrink: 0;
        }

        .final-answer-math {
            border: 1.5px solid var(--brand-primary);
            border-radius: var(--border-radius-sm);
            padding: 6px 16px;
            font-size: 1.25rem;
            font-weight: 600;
            display: inline-block;
        }

        /* Responsive Math Wrapper Blocks */
        .solution-math-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 0;
            width: 100%;
            overflow-x: auto; 
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .solution-math-container .katex-display {
            font-size: clamp(1rem, 4vw, 1.3rem);
            margin: 0.4em 0;
            max-width: 100%;
        }

        /* Step rows structural blueprint */
        .step-row {
            border-bottom: 1px solid var(--color-border-light);
            padding: 28px 0;
            width: 100%;
        }

        .step-row:last-of-type {
            border-bottom: none;
            padding-bottom: 8px;
        }

        .step-header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
        }

        .step-title-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .step-badge-number {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background-color: var(--brand-primary);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-instruction-text {
            font-size: 1.02rem;
            font-weight: 600;
            color: var(--color-text-body);
            line-height: 1.45;
        }

        .step-pill-indicator {
            background-color: var(--brand-light);
            color: var(--brand-primary);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        /* ==========================================================================
           9. STRATEGIC TIPS BANNER
           ========================================================================== */
        .tip-container {
            background-color: var(--bg-canvas);
            border: 1px solid var(--color-border-card);
            border-radius: var(--border-radius-md);
            padding: 20px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-top: 24px;
            width: 100%;
        }

        .tip-icon-box {
            color: var(--brand-primary);
            flex-shrink: 0;
        }

        .tip-icon-box svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .tip-text-content {
            font-size: 0.95rem;
            line-height: 1.55;
            color: var(--color-text-body);
        }

        .tip-text-content strong {
            color: var(--color-text-title);
            display: block;
            margin-bottom: 4px;
            font-weight: 700;
        }

        /* ==========================================================================
           10. FOOTER & COPYRIGHT ENGINE
           ========================================================================== */
        .page-footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            font-weight: 600;
            padding: 48px 0 16px 0;
            width: 100%;
            border-top: 1px solid var(--color-border-light);
            margin-top: 24px;
        }

        /* ==========================================================================
           11. ZERO SIDE-SCROLL MEDIA INJECTORS FOR RESPONSIVE PERFECTION
           ========================================================================== */
        @media (max-width: 820px) {
            .question-flex-body {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .question-elements-right {
                width: 100%;
                justify-content: space-between;
                border-top: 1px solid var(--color-border-light);
                padding-top: 16px;
                margin-top: 4px;
            }
        }

        @media (max-width: 680px) {
            .navigation-header {
                padding: 24px 20px 16px 20px;
            }
            
            .app-root-container {
                padding: 0 16px 60px 16px;
                gap: 20px;
            }

            .paper-banner {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .back-button {
                width: 100%;
                justify-content: center;
                border: 1.5px solid var(--brand-primary);
                padding: 12px;
                border-radius: var(--border-radius-sm);
            }

            .workspace-sub-header {
                align-items: flex-start;
                flex-direction: column;
                gap: 8px;
                padding: 20px;
            }

            .workspace-sub-equation {
                margin-left: 0;
                width: 100%;
                white-space: normal;
            }

            .workspace-sub-marks {
                align-self: flex-end;
            }

            .question-item-card {
                padding: 20px;
                border-radius: 20px;
            }
            
            .question-content-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .math-typeset-wrapper {
                display: block;
                margin-left: 0;
                margin-top: 10px;
                font-size: 1.1rem;
            }
            
            .question-elements-right {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }

            .points-weight-pill {
                align-self: flex-start;
            }

            .question-actions-toolbar {
                flex-direction: column; 
                width: 100%;
                gap: 10px;
            }
            
            .action-button {
                width: 100%; 
                text-align: center;
            }
            
            .user-name, .chevron-down {
                display: none; 
            }
            
            .accordion-inner-content {
                flex-direction: column;
                gap: 10px;
            }
            
            .segmented-tab-btn {
                width: 100%;
                text-align: center;
            }

            .workspace-card {
                padding: 20px;
            }
        }

        @media (max-width: 400px) {
            .step-header-container {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .step-pill-indicator {
                align-self: flex-end;
            }

            .final-answer-box {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
                gap: 12px;
            }

            .final-answer-math {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <nav class="nav-outer-wrapper">
        <header class="navigation-header">
            <a href="#" class="brand-logo" id="homeLogoBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/>
                    <path d="M3.58 12.44L12 17l8.42-4.56v4.61L12 21.61l-8.42-4.56v-4.61z"/>
                </svg>
                <span class="brand-title">Grade 12 <span>Learning</span></span>
            </a>
            
            <div class="user-profile">
                <div class="avatar">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <span class="user-name">Hi, Paul</span>
                <svg class="chevron-down" viewBox="0 0 24 24">
                    <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
        </header>
    </nav>

    <div class="app-root-container">
        
        <main class="app-view is-active" id="questionsGalleryView">
            
            <div class="accordion-wrapper-card is-expanded" id="examAccordion">
                <button class="accordion-header-btn" onclick="toggleExamAccordion()" aria-expanded="true" aria-controls="examAccordionPanel">
                    <div class="accordion-meta-group">
                        <div class="accordion-calendar-icon-box">
                            <svg viewBox="0 0 24 24">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                        </div>
                        <span class="accordion-subject-title">2025 Latest</span>
                    </div>
                    <svg class="accordion-arrow-indicator" viewBox="0 0 24 24">
                        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                
                <div class="accordion-transition-panel" id="examAccordionPanel" style="max-height: 250px;">
                    <div class="accordion-inner-content">
                        <button class="segmented-tab-btn is-active" onclick="switchPaperChannel(1, this)">Mathematics Paper 1</button>
                        <button class="segmented-tab-btn" onclick="switchPaperChannel(2, this)">Mathematics Paper 2</button>
                    </div>
                </div>
            </div>

            <div class="section-separator-bar">
                <h2 class="section-separator-title" id="activeSectionTitle">Section A: Algebra</h2>
            </div>

            <div class="questions-vertical-stack" id="questionsInjectionStream">
                </div>

        </main>

        <main class="app-view" id="stepWorkspaceView">
            
            <header class="paper-banner">
                <div class="banner-left">
                    <div class="math-icon-wrapper">
                        <svg viewBox="0 0 24 24">
                            <path d="M3 12h3l3-9 4 18 3-12h5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="banner-title-group">
                        <h1 id="workspaceBannerTitle">Mathematics &ndash; 2025 Paper 1</h1>
                        <p>Review solution steps to build solid foundational understanding.</p>
                    </div>
                </div>
                <button class="back-button" id="workspaceBackBtn">← Back to Questions</button>
            </header>

            <section class="workspace-sub-header" id="workspaceHeaderContainer">
                </section>

            <article class="workspace-card">
                
                <div class="answer-header-row">
                    <h2 class="section-header">Answer</h2>
                    <button class="toggle-answer-btn" id="toggleAnswerBtn" onclick="toggleAnswerContainer()" aria-expanded="true" aria-controls="answerValueBlock">
                        <svg style="width:16px; height:16px; fill:currentColor;" viewBox="0 0 24 24">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                        <span id="toggleText">Hide Answer</span>
                    </button>
                </div>

                <div id="answerValueBlock" class="final-answer-box">
                    </div>

                <hr style="border: 0; border-top: 1px solid var(--color-border-light); margin: 24px 0;">

                <h2 class="section-header" style="margin-bottom: 8px;">Step-by-Step Solution</h2>

                <div id="stepsInjectedContainer">
                    </div>

                <aside class="tip-container" id="tipBoxContainer">
                    </aside>

            </article>

        </main>

        <footer class="page-footer">
            &copy; 2026 Grade 12 Learning. All rights reserved.
        </footer>

    </div>

    <script src="math.js"></script>
</body>
</html>
